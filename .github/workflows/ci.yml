name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: rustfmt
        run: cargo fmt -- --check
      - name: Tests + coverage (lcov)
        run: cargo llvm-cov --workspace --lcov --output-path coverage-rust.lcov
      - name: Tests + coverage (HTML)
        run: cargo llvm-cov --workspace --html --output-dir coverage-rust
      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: |
            coverage-rust/
            coverage-rust.lcov

  frontend:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install JS deps
        working-directory: frontend
        run: npm ci
      - name: Vitest with coverage
        working-directory: frontend
        run: npm run coverage
      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-js
          path: frontend/coverage/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install JS deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: E2E tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
