<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watten</title>
    <style>
      html, body { margin: 0; padding: 0; background: #1f4d1f; color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #fallback { max-width: 540px; margin: 40px auto; padding: 24px;
        background: rgba(0,0,0,0.25); border-radius: 8px; line-height: 1.5; }
      #fallback h1 { margin-top: 0; }
      #fallback code { background: rgba(255,255,255,0.1); padding: 1px 6px;
        border-radius: 3px; }
      .spinner { width: 28px; height: 28px; margin: 12px 0;
        border: 3px solid rgba(255,255,255,0.25); border-top-color: #ffe066;
        border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;
        vertical-align: middle; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback">
        <h1>Watten</h1>
        <p><span class="spinner" aria-hidden="true"></span>&nbsp;Loading the WebAssembly engine…</p>
        <p>
          If this message stays here, the WebAssembly bundle didn't load. To run the
          trainer locally:
        </p>
        <pre><code>git clone &lt;repo&gt;
cd watten
make dev          # or: npm start</code></pre>
        <p>Then open <a href="http://localhost:5173" style="color:#ffe066">http://localhost:5173</a>.</p>
        <noscript>
          <p style="color:#ffd1d1"><strong>JavaScript is disabled.</strong> The trainer needs JavaScript and WebAssembly to run.</p>
        </noscript>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
